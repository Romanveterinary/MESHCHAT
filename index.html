<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MESH CORE TESTER</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #0b0b0b; font-family: monospace; overflow: hidden; color: #fff; }
        #map { width: 100%; height: 50vh; background: #111; border-bottom: 2px solid #222; }
        #tactic-panel { width: 100%; height: 50vh; display: flex; flex-direction: column; background: #050505; box-sizing: border-box; }
        .row { display: flex; gap: 8px; padding: 8px 12px; align-items: center; }
        input, select, textarea { background: #111; color: #0cf; border: 1px solid #333; border-radius: 6px; padding: 10px; font-family: monospace; font-size: 0.9rem; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { border-color: #0cf; outline: none; }
        #peers-zone { background: rgba(0,20,0,0.2); border: 1px solid #131; border-radius: 6px; min-height: 40px; max-height: 65px; overflow-y: auto; padding: 6px; font-size: 0.85rem; display: flex; flex-direction: column; gap: 4px; }
        #chat-box { flex: 1; background: #020202; border: 1px solid #151515; margin: 0 12px 8px 12px; border-radius: 6px; padding: 10px; overflow-y: auto; font-size: 0.95rem; }
        .btn { background: #111; color: #4ade80; border: 1px solid #4ade80; border-radius: 6px; padding: 12px; font-family: monospace; font-weight: bold; cursor: pointer; text-align: center; text-transform: uppercase; font-size: 0.9rem; }
        .btn:active { background: #040; }
        .btn-sec { color: #aaa; border-color: #333; }
        .btn-voice { width: 50px; color: #0cf; border-color: #0cf; font-size: 1.3rem; padding: 0; display: flex; align-items: center; justify-content: center; }
        .msg-line { margin-bottom: 4px; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="tactic-panel">
        
        <div class="row" style="padding-bottom: 4px;">
            <input type="text" id="my-callsign" placeholder="Мій Позивний..." value="Боєць" style="flex: 1.2; font-weight: bold;">
            <select id="network-transport" style="flex: 1;">
                <option value="wifi">📶 Wi-Fi P2P</option>
                <option value="bt">📻 BLUETOOTH</option>
            </select>
        </div>

        <div style="padding: 0 12px 4px 12px; font-size: 0.75rem; color: #666; text-transform: uppercase;">Група в ефірі (Тап для привату):</div>
        <div style="padding: 0 12px;">
            <div id="peers-zone">📡 Пошук радіосигналу...</div>
        </div>

        <div id="chat-target" style="padding: 6px 12px 2px 12px; font-size: 0.8rem; color: #fff; font-weight: bold;">
            🌍 РЕЖИМ: ЗАГАЛЬНИЙ ЕФІР (ДЛЯ ВСІХ)
        </div>

        <div id="chat-box">
            <div style="color: #333; text-align: center; font-size: 0.8rem;">--- Стрічка зв'язку порожня ---</div>
        </div>

        <div class="row" style="padding-top: 0; padding-bottom: 12px;">
            <textarea id="msg-input" placeholder="Текст радіограми..." style="flex: 1; height: 45px; resize: none;"></textarea>
            <button id="ptt-btn" class="btn btn-voice" title="Затисніть для запису 5 сек голосу">🎙️</button>
            <button id="send-btn" class="btn" style="height: 45px; padding: 0 15px;">ЕФІР</button>
            <button id="reset-chat-btn" class="btn btn-sec" style="height: 45px; padding: 0 10px;" title="Скинути на загальний ефір">🌍</button>
        </div>

    </div>

    <script src="app.js"></script>
</body>
</html>
