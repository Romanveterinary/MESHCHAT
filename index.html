<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tactical Mesh Navigator</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div id="tactical-telemetry">
        <div id="compass-container">
            <div id="compass-rose">🧭</div>
            <div id="azimuth-val">0°</div>
        </div>
        <div id="gps-data-block">
            <div>ШИР: <span id="gps-lat">--.-----</span></div>
            <div>ДОВ: <span id="gps-lon">--.-----</span></div>
            <div>ВИС: <span id="gps-alt">-- м</span> | ТОЧН: <span id="gps-acc">-- м</span></div>
        </div>
    </div>

    <div id="tactic-panel">
        
        <div class="row">
            <input type="text" id="my-callsign" value="Боєць-1" placeholder="Ваш позивний" style="flex: 1;">
            <button class="btn btn-sec" id="reset-chat-btn" style="flex: 1;">🌍 ЕФІР</button>
        </div>

        <div style="padding: 0 12px;"><span style="font-size: 11px; color: #888;">ГРУПА В ЕФІРІ (НАТИСНІТЬ ДЛЯ ПРИВАТУ):</span></div>
        <div id="peers-zone" style="margin: 2px 12px 6px 12px;">📡 Пошук радіосигналу...</div>

        <div style="padding: 0 12px;"><span id="chat-target" style="font-size: 11px; color: #4ade80; font-weight: bold;">🌍 РЕЖИМ: ЗАГАЛЬНИЙ ЕФІР (ДЛЯ ВСІХ)</span></div>

        <div id="chat-box"></div>

        <div class="row" style="padding-bottom: 12px;">
            <input type="text" id="msg-input" placeholder="Текст повідомлення..." style="flex: 1;">
            <button class="btn" id="send-btn" style="width: 80px;">SEND</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
