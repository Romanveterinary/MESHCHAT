name: Build Tactical Mesh APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Tools and Dependencies
        run: |
          npm install

      - name: Run Web Build and Create WWW Folder
        run: |
          npm run build

      - name: Initialize Capacitor Project
        run: |
          npx cap init "Tactical Mesh" "tactical.mesh.navigator" --web-dir=www

      - name: Create Android Project Structure
        run: |
          npx cap add android

      - name: Configure Android Hardware and Network Permissions
        run: |
          # 1. Шлях до автоматично згенерованого маніфесту Android
          MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
          
          # 2. Сучасні дозволи (GPS, Wi-Fi Direct, Bluetooth) для систем Android 10-14
          PERMISSIONS="<uses-permission android:name=\"android.permission.ACCESS_FINE_LOCATION\" /><uses-permission android:name=\"android.permission.ACCESS_COARSE_LOCATION\" /><uses-permission android:name=\"android.permission.INTERNET\" /><uses-permission android:name=\"android.permission.ACCESS_NETWORK_STATE\" /><uses-permission android:name=\"android.permission.ACCESS_WIFI_STATE\" /><uses-permission android:name=\"android.permission.CHANGE_WIFI_STATE\" /><uses-permission android:name=\"android.permission.BLUETOOTH_SCAN\" android:usesPermissionFlags=\"neverForLocation\" /><uses-permission android:name=\"android.permission.BLUETOOTH_CONNECT\" /><uses-permission android:name=\"android.permission.BLUETOOTH_ADVERTISE\" /><uses-permission android:name=\"android.permission.BLUETOOTH\" android:maxSdkVersion=\"30\" /><uses-permission android:name=\"android.permission.BLUETOOTH_ADMIN\" android:maxSdkVersion=\"30\" />"
          
          # Автоматичне впорскування дозволів у маніфест
          sed -i "s/<manifest[^>]*>/&\\n$PERMISSIONS/" $MANIFEST_PATH
          
          # 3. Дозволяємо локальний трафік без шифрування (Cleartext) для сокетів
          sed -i 's/<application[^>]*>/& android:usesCleartextTraffic="true"/' $MANIFEST_PATH

      - name: Inject Custom Native Mesh Hardware Code
        run: |
          # Копіюємо обидва файли (MainActivity та окремий файл плагіна) у нативну структуру
          TARGET_DIR="android/app/src/main/java/tactical/mesh/navigator"
          
          cp .github/workflows/MainActivity.java.override $TARGET_DIR/MainActivity.java
          cp .github/workflows/TargetHardwarePlugin.java $TARGET_DIR/TargetHardwarePlugin.java
          
          echo "Нативний міст та плагін радіомодулів успішно інтегровано в збірку."

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Sync Web Assets to Android Environment
        run: |
          npx cap sync android

      - name: Build Official Android APK File
        run: |
          cd android && ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tactical-mesh-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
