name: Build Tactical Mesh APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'

      - name: Install Tools and Dependencies
        run: |
          npm install
          npm install @capacitor/android

      - name: Run Web Build and Create WWW Folder
        run: |
          npm run build

      - name: Generate Missing Capacitor Config
        run: |
          echo '{
            "appId": "tactical.mesh.navigator",
            "appName": "Tactical Mesh",
            "webDir": "www",
            "server": { "androidScheme": "https" }
          }' > capacitor.config.json

      # Замість створення з нуля, просто синхронізуємо існуючу папку
      - name: Sync Android Environment
        run: |
          npx cap sync android

      # Тепер маніфест точно на місці, безпечно його редагуємо
      - name: Configure Android Hardware Permissions via Node.js
        run: |
          node -e '
          const fs = require("fs");
          const path = "android/app/src/main/AndroidManifest.xml";
          if (!fs.existsSync(path)) {
              console.error("Маніфест не знайдено за шляхом: " + path);
              process.exit(1);
          }
          let content = fs.readFileSync(path, "utf8");
          
          const permissions = `
          <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
          <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
          <uses-permission android:name="android.permission.INTERNET" />
          <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
          <uses-permission android:name="android.permission.ACCESS_WIFI_STATE" />
          <uses-permission android:name="android.permission.CHANGE_WIFI_STATE" />
          <uses-permission android:name="android.permission.BLUETOOTH_SCAN" android:usesPermissionFlags="neverForLocation" />
          <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
          <uses-permission android:name="android.permission.BLUETOOTH_ADVERTISE" />
          <uses-permission android:name="android.permission.BLUETOOTH" android:maxSdkVersion="30" />
          <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" android:maxSdkVersion="30" />
          `;
          
          // Захист від подвійного додавання дозволів
          if (!content.includes("BLUETOOTH_CONNECT")) {
              content = content.replace(/<manifest[^>]*>/, "$&\n" + permissions);
          }
          if (!content.includes("usesCleartextTraffic")) {
              content = content.replace(/<application[^>]*>/, "$& android:usesCleartextTraffic=\"true\"");
          }
          
          fs.writeFileSync(path, content, "utf8");
          console.log("Дозволи та мережеві налаштування успішно інтегровано в маніфест.");
          '

      - name: Inject Custom Native Mesh Hardware Code
        run: |
          TARGET_JAVA_PATH="android/app/src/main/java/tactical/mesh/navigator/MainActivity.java"
          # Розумний пошук файлу override
          if [ -f "MainActivity.java.override" ]; then
            cp MainActivity.java.override $TARGET_JAVA_PATH
          elif [ -f ".github/workflows/MainActivity.java.override" ]; then
            cp .github/workflows/MainActivity.java.override $TARGET_JAVA_PATH
          else
            echo "УВАГА: Не знайдено файл MainActivity.java.override!"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Build Official Android APK File
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload Finished APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tactical-mesh-app
          path: android/app/build/outputs/apk/debug/app-debug.apk
